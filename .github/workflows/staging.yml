# Staging: push Docker images on every push to `staging`.
# Skips image build/push when this push only syncs `main` into `staging` (PR "Update branch"),
# or when the commit message contains [skip staging] — avoids pointless deploys while merging staging → main.
name: Staging

on:
  push:
    branches:
      - staging

# Updated per deployment protocol
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  gate:
    name: Decide whether to build staging image
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Detect merge-main-into-staging sync (skip image) or [skip staging]
        id: check
        run: |
          msg=$(jq -r '(.head_commit // {}).message // empty' "$GITHUB_EVENT_PATH")
          if [[ "$msg" == *"[skip staging]"* ]] || [[ "$msg" == *"[skip staging image]"* ]]; then
            echo "skip: commit message token"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$msg" == *"Merge branch 'main' into staging"* ]] || \
             [[ "$msg" == *'Merge branch "main" into staging'* ]] || \
             [[ "$msg" == *"Merge remote-tracking branch 'origin/main' into staging"* ]]; then
            echo "skip: syncing main into staging only"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and push staging image
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Updated per deployment protocol
      - name: Read APP_VERSION from VERSION
        run: |
          APP_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "Using APP_VERSION=$APP_VERSION (build arg will append -staging)"

      - name: Set short SHA for image tag
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Updated per deployment protocol
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Updated per deployment protocol — tags :staging and :staging-<sha>; same image repo as production
      - name: Build and push staging image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:staging-${{ env.SHORT_SHA }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}-staging
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:buildcache,mode=max
